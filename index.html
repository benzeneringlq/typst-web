<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMirror + Typst Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f5;
      --panel-border: #d9dee7;
      --toolbar-border: #d7dce4;
      --text: #1f2937;
      --muted: #667085;
    }

    html,
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 111, 235, 0.08), transparent 28%),
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #app {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(247, 248, 251, 0.92);
      border-bottom: 1px solid var(--toolbar-border);
      overflow-x: auto;
      white-space: nowrap;
    }

    #toolbar .brand {
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
      margin-right: 8px;
    }

    .tool-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding-right: 10px;
      margin-right: 10px;
      border-right: 1px solid rgba(100, 116, 139, 0.14);
    }

    .tool-button {
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 0;
      height: 28px;
      padding: 0 6px;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition:
        color 120ms ease,
        opacity 120ms ease;
    }

    .tool-button:hover {
      color: #0f172a;
      opacity: 0.8;
    }

    .tool-button:active {
      opacity: 0.6;
    }

    #workspace {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }

    #editor-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1.15 1 0;
      width: min(960px, 100%);
    }

    #editor-wrap {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #editor {
      flex: 1;
      height: 100%;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, monospace;
      font-size: 15px;
      line-height: 1.55;
      padding: 14px 16px;
      box-sizing: border-box;
      border: 1px solid var(--panel-border);
      border-radius: 0;
      background: #fcfdff;
      color: var(--text);
      resize: none;
      outline: none;
    }

    #editor:focus {
      border-color: rgba(100, 116, 139, 0.16);
      box-shadow: none;
    }

    #preview-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 0.85 1 0;
      width: min(960px, 100%);
    }

    #viewer {
      flex: 1;
      height: 100%;
      overflow: auto;
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      box-sizing: border-box;
    }

    #viewer svg {
      width: 100%;
      max-width: none;
      height: auto;
      display: block;
      background: white;
      border-radius: 0;
      box-shadow: none;
      align-self: flex-start;
    }

    #error {
      color: #d32f2f;
      padding: 20px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    #loading {
      color: var(--muted);
      font-size: 15px;
    }

    @media (max-width: 900px) {
      #workspace {
        padding: 12px;
      }

      #editor-shell {
        width: 100%;
      }

      #preview-shell {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      #toolbar {
        padding: 10px 12px;
      }

      #workspace {
        padding: 10px;
      }

      #editor {
        font-size: 14px;
      }
    }

    @media (min-width: 1200px) {
      #workspace {
        padding: 14px;
      }

      #editor-shell {
        flex-basis: 0;
      }

      #preview-shell {
        flex-basis: 0;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header id="toolbar" aria-label="Typst toolbar">
      <div class="brand">Typst</div>
      <div class="tool-group" id="snippet-toolbar">
        <button class="tool-button" type="button" data-snippet="lim">lim</button>
        <button class="tool-button" type="button" data-snippet="sum">sum</button>
        <button class="tool-button" type="button" data-snippet="int">int</button>
        <button class="tool-button" type="button" data-snippet="matrix">matrix</button>
        <button class="tool-button" type="button" data-snippet="frac">frac</button>
        <button class="tool-button" type="button" data-snippet="sqrt">sqrt</button>
      </div>
      <div class="tool-group">
        <button class="tool-button" type="button" data-snippet="heading">Heading</button>
        <button class="tool-button" type="button" data-snippet="bullet">Bullet</button>
        <button class="tool-button" type="button" data-snippet="code">Code</button>
      </div>
    </header>

    <main id="workspace">
      <section id="editor-shell">
        <div id="editor-wrap">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
      </section>

      <section id="preview-shell">
        <div id="viewer">
          <div id="loading">Loading Typst...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Typst all-in-one bundle -->
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@myriaddreamin/typst.ts/dist/esm/contrib/all-in-one-lite.bundle.js"></script>

  <script type="module">
    const viewer = document.getElementById("viewer");
    const editor = document.getElementById("editor");
    const snippetToolbar = document.getElementById("snippet-toolbar");

    // 初始文档内容
    const initialDoc = `#set page("us-letter")
#set text(font: "Linux Libertine", size: 11pt)

= Hello Typst!

Type something here and see the live preview below.

== Math Example

The exponential function can be expressed as:

$ e^x = sum_(i=0)^infinity x^i / i! $

== Lists

- First item
- Second item
- Third item

== Code

\`\`\`python
def hello():
    print("Hello, World!")
\`\`\`

*Bold text* and _italic text_.`;

    editor.value = initialDoc;

    // 初始化 Typst
    $typst.setCompilerInitOptions({
      getModule: () =>
        "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-web-compiler/pkg/typst_ts_web_compiler_bg.wasm",
    });

    $typst.setRendererInitOptions({
      getModule: () =>
        "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-renderer/pkg/typst_ts_renderer_bg.wasm",
    });

    // 编译 Typst 代码
    let compileTimeout;
    const compile = function (mainContent) {
      $typst
        .svg({ mainContent })
        .then((svg) => {
          viewer.innerHTML = svg;
        })
        .catch((err) => {
          console.error("Typst render error:", err);
          viewer.innerHTML = `<div id="error">Typst Error:\n${err.message || err}</div>`;
        });
    };

    const snippets = {
      lim: `lim_(x -> 0)`,
      sum: `sum_(i=0)^infinity`,
      int: `integral_0^1`,
      matrix: `mat(1, 0; 0, 1)`,
      frac: `frac(a, b)`,
      sqrt: `sqrt(x)`,
      heading: `= Section Title`,
      bullet: `- First item\n- Second item`,
      code: "```typst\nlet x = 1\n```",
    };

    const insertSnippet = (snippet) => {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const value = editor.value;
      const nextValue = value.slice(0, start) + snippet + value.slice(end);

      editor.value = nextValue;

      const cursor = start + snippet.length;
      editor.selectionStart = cursor;
      editor.selectionEnd = cursor;
      editor.focus();
      compile(editor.value);
    };

    snippetToolbar.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-snippet]");
      if (!button) {
        return;
      }

      const snippetName = button.dataset.snippet;
      if (!snippetName || !Object.prototype.hasOwnProperty.call(snippets, snippetName)) {
        return;
      }

      insertSnippet(snippets[snippetName]);
    });

    // 监听输入变化，使用防抖
    editor.addEventListener("input", () => {
      clearTimeout(compileTimeout);
      compileTimeout = setTimeout(() => {
        compile(editor.value);
      }, 300); // 300ms 防抖
    });

    // 支持 Tab 键缩进
    editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value =
          editor.value.substring(0, start) +
          "  " +
          editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // 首次渲染
    compile(editor.value);
  </script>
</body>

</html>
